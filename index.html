<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול עסקים</title>
  <style>
    :root{
      --bg:#06121a;
      --panel:#0b1f2a;
      --panel2:#0f2c3a;
      --field:#071822;
      --line:rgba(255,255,255,.08);
      --text:#e9faff;
      --muted:#7fa6b8;
      --primary:#2bd4ff;
      --primary2:#00a8cc;
      --accent:#1de9b6;
      --ok:#1de9b6;
      --danger:#ff7b7b;
      --shadow:0 22px 60px rgba(0,0,0,.4);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Arial,"Heebo",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(43,212,255,.14), transparent 25%),
        radial-gradient(circle at bottom left, rgba(29,233,182,.08), transparent 28%),
        linear-gradient(180deg,#0b111d 0%,#070b13 100%);
    }
    .page{max-width:920px;margin:0 auto;padding:18px 14px 34px}
    .top-title{
      border-radius:28px;border:1px solid var(--line);
      background:linear-gradient(180deg,rgba(23,34,55,.95),rgba(12,18,30,.95));
      box-shadow:var(--shadow);padding:23px 18px;margin-bottom:14px;text-align:center;
    }
    .top-title h1{margin:0;font-size:30px;color:var(--primary);letter-spacing:-.5px}
    .card{
      border-radius:26px;border:1px solid rgba(255,255,255,.07);
      background:linear-gradient(180deg,rgba(18,26,41,.78),rgba(9,14,24,.78));
      backdrop-filter:blur(12px);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;
    }
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
    .section-head h2{margin:0;color:var(--primary);font-size:21px}
    .small-note{font-size:12px;color:var(--muted);line-height:1.6;margin-top:5px}
    .screen{display:none;animation:fadeIn .2s ease both}.screen.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    label{display:block;margin:12px 4px 7px;color:var(--muted);font-size:12px}
    input,select{
      width:100%;border:1px solid rgba(255,255,255,.09);outline:none;border-radius:17px;
      padding:14px 15px;background:var(--field);color:var(--text);font-size:15px;
    }
    input:focus,select:focus{border-color:rgba(43,212,255,.5);box-shadow:0 0 0 3px rgba(43,212,255,.08)}
    .ltr{direction:ltr;text-align:left}.hint{font-size:11px;color:rgba(168,179,199,.76);line-height:1.55;margin:6px 4px 0}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{
      border:none;cursor:pointer;border-radius:18px;padding:14px 16px;font-weight:900;
      transition:.18s transform,.18s opacity,.18s box-shadow,.18s background;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:hover{transform:translateY(-2px);box-shadow:0 0 14px rgba(43,212,255,.24)}
    .btn.primary{width:100%;color:#00222c;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 14px 32px rgba(43,212,255,.18)}
    .btn.ghost{color:var(--text);background:#111b2c;border:1px solid rgba(255,255,255,.10)}
    .btn.danger{color:#ffc8c8;background:rgba(255,123,123,.08);border:1px solid rgba(255,123,123,.26)}
    .btn.freeze{color:#ffe8b2;background:rgba(230,193,115,.10);border:1px solid rgba(230,193,115,.28)}
    .btn.unfreeze{color:#bcf8d1;background:rgba(29,233,182,.10);border:1px solid rgba(29,233,182,.28)}
    .btn.small{padding:11px 12px;border-radius:15px;font-size:12px}
    .form-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.status{min-height:22px;margin-top:10px;color:var(--muted);font-size:12px;line-height:1.6}
    .add-business-box{padding:0}.add-business-box .btn{min-height:58px;font-size:16px}
    .topbar{display:flex;gap:10px;margin:12px 0 14px;align-items:center}
    .business-list{display:grid;gap:10px}
    .business-row{
      width:100%;text-align:right;border:1px solid rgba(255,255,255,.09);border-radius:20px;
      background:linear-gradient(180deg,rgba(23,34,55,.90),rgba(12,18,30,.92));
      color:var(--text);padding:14px 15px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;cursor:pointer;
      transition:.2s ease;
    }
    .business-row:hover{transform:translateY(-2px);box-shadow:0 0 18px rgba(43,212,255,.16);border-color:rgba(43,212,255,.24)}
    .row-title{font-weight:900;font-size:16px;color:#fff}.row-sub{font-size:12px;color:var(--muted);margin-top:5px;direction:ltr;text-align:right}
    .row-arrow{color:var(--primary);font-weight:900;font-size:20px}.empty{text-align:center;padding:30px 12px;color:var(--muted);line-height:1.8;border:1px dashed rgba(255,255,255,.10);border-radius:22px;background:rgba(255,255,255,.02)}
    .detail-card{border-radius:24px;border:1px solid rgba(255,255,255,.09);background:rgba(5,12,22,.34);padding:16px;margin-top:12px}
    .business-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:8px}.meta{color:var(--muted);font-size:13px;line-height:1.75}.badge{display:inline-flex;align-items:center;justify-content:center;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;background:rgba(140,240,181,.12);color:#bcf8d1;border:1px solid rgba(140,240,181,.22);white-space:nowrap}.badge.pro{background:rgba(114,201,255,.11);color:#b9e9ff;border-color:rgba(114,201,255,.24)}.badge.premium{background:rgba(230,193,115,.12);color:#ffe8b2;border-color:rgba(230,193,115,.25)}.badge.frozen{background:rgba(255,123,123,.12);color:#ffc8c8;border-color:rgba(255,123,123,.28);margin-inline-start:6px}
    .business-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}.link-label{margin:12px 0 6px;color:rgba(168,179,199,.86);font-size:12px}.link-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.link-box{direction:ltr;text-align:left;background:#09101d;border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:12px 13px;color:#9fdcff;word-break:break-all;font-size:13px;min-height:42px;display:flex;align-items:center}.mini-btn{min-width:92px;padding:12px 13px;border-radius:16px;border:1px solid rgba(255,255,255,.10);background:#111b2c;color:var(--text);cursor:pointer;font-weight:900;font-size:12px}.actions{display:grid;grid-template-columns:1fr 1fr 1fr 90px;gap:8px;margin-top:14px}
    .stats-wrap{margin:10px 0 2px;display:grid;gap:7px}
    .stats-strip{
      display:grid;grid-template-columns:repeat(4,1fr);align-items:center;
      border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;
      background:linear-gradient(90deg,rgba(9,16,29,.32),rgba(11,31,42,.24),rgba(9,16,29,.32));
    }
    .stat-item{
      min-height:42px;padding:7px 6px;text-align:center;position:relative;
      display:flex;flex-direction:column;justify-content:center;gap:2px;transition:.22s ease;
    }
    .stat-item:not(:last-child)::after{
      content:"";position:absolute;left:0;top:10px;bottom:10px;width:1px;background:rgba(255,255,255,.07);
    }
    .stat-label{font-size:9.5px;color:var(--muted);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat-value{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.3px;line-height:1}
    .stat-item.stat-changed{animation:softStatPulse .75s ease both}
    .stat-item.stat-changed .stat-value{animation:softNumberPop .45s ease both;color:#e9fcff}
    @keyframes softStatPulse{0%{background:rgba(43,212,255,0);transform:translateY(0)}35%{background:rgba(43,212,255,.08);transform:translateY(-1px)}100%{background:rgba(43,212,255,0);transform:translateY(0)}}
    @keyframes softNumberPop{0%{transform:scale(.96);opacity:.72}55%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}
    .activity-line{padding:0 3px;color:var(--muted);font-size:11px;line-height:1.55}
    .activity-line strong{color:#dff8ff;font-size:12px;font-weight:800}
    .activity-line.activity-changed strong{animation:softActivityGlow .9s ease both}
    @keyframes softActivityGlow{0%{text-shadow:0 0 0 rgba(43,212,255,0)}40%{text-shadow:0 0 12px rgba(43,212,255,.35)}100%{text-shadow:0 0 0 rgba(43,212,255,0)}}
    .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;transition:.25s ease;width:min(92vw,520px);padding:14px 16px;border-radius:18px;text-align:center;z-index:99999;box-shadow:var(--shadow);background:#101827;border:1px solid rgba(255,255,255,.10);color:var(--text)}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.error{background:#351111;border-color:rgba(255,123,123,.55)}
    @media(max-width:720px){.page{padding-top:12px}.top-title h1{font-size:26px}.row,.form-actions,.actions,.link-row{grid-template-columns:1fr}.stats-strip{grid-template-columns:repeat(4,1fr)}.mini-btn{width:100%}.business-top{flex-direction:column}.topbar{display:grid}}
  </style>
</head>
<body>
  <main class="page">
    <section class="top-title"><h1>ניהול עסקים</h1></section>

    <section id="homeScreen" class="screen active">
      <div class="card add-business-box">
        <button class="btn primary" id="openAddBtn">+ הוסף עסק</button>
      </div>

      <section class="card">
        <div class="section-head"><h2>העסקים שלי</h2></div>
        <div class="small-note">העסקים מוצגים כרשימה נקייה. לחיצה על עסק פותחת את הפרטים שלו.</div>
        <div class="topbar"><input id="searchInput" placeholder="חפש עסק / ID / מספר..." /></div>
        <div id="businessList" class="business-list"><div class="empty">טוען עסקים...</div></div>
      </section>
    </section>

    <section id="formScreen" class="screen">
      <section class="card">
        <div class="section-head">
          <div><h2 id="formTitle">הוספת עסק</h2><div class="small-note">יצירה או עריכה של עסק מתוך businessSettings בלבד.</div></div>
          <button class="btn ghost small" id="backFromFormBtn">חזרה</button>
        </div>

        <label>שם העסק</label>
        <input id="businessName" placeholder="לדוגמה: מספרת אליהו" />

        <label>businessId</label>
        <input id="businessId" class="ltr" placeholder="eliyahu-barber" />
        <div class="hint">אנגלית, מספרים ומקף בלבד. לדוגמה: shimon-barber</div>

        <label>מספר וואטסאפ</label>
        <input id="whatsappNumber" class="ltr" inputmode="numeric" maxlength="12" placeholder="9725XXXXXXXX" />
        <div class="hint">חייב להתחיל ב־972 ולהיות בדיוק 12 ספרות.</div>

        <div class="row">
          <div><label>חבילה</label><select id="plan"><option value="basic">בסיסי</option><option value="pro">מתקדם</option><option value="premium">פרימיום</option></select></div>
          <div><label>קוד בעל עסק</label><input id="ownerCode" inputmode="numeric" maxlength="4" placeholder="1234" /></div>
        </div>

        <button class="btn primary" id="saveBtn">שמור עסק</button>
        <div class="form-actions"><button class="btn ghost" id="resetBtn">נקה טופס</button><button class="btn ghost" id="refreshBtn">רענן</button></div>
        <div class="status" id="saveStatus"></div>
      </section>
    </section>

    <section id="detailScreen" class="screen">
      <section class="card">
        <div class="section-head"><h2>פרטי עסק</h2><button class="btn ghost small" id="backFromDetailsBtn">חזרה</button></div>
        <div id="businessDetails"></div>
      </section>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCba0XlBoAWJ1eiH6wqer74sSiMyRKfK2s",
      authDomain: "game1-9d372.firebaseapp.com",
      projectId: "game1-9d372",
      storageBucket: "game1-9d372.appspot.com",
      messagingSenderId: "387028062033",
      appId: "1:387028062033:web:7bf29040c7bb4b15d54d70"
    };

    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const COLLECTION = "businessSettings";
    const APPOINTMENTS_COLLECTION = "appointments";
    const APP_BASE_URL = "https://galhadad-app.github.io/Master-B/index.html";

    const DEFAULT_WORKING_HOURS = {
      sunday:{start:"10:00",end:"20:00",closed:false},
      monday:{start:"10:00",end:"20:00",closed:false},
      tuesday:{start:"10:00",end:"20:00",closed:false},
      wednesday:{start:"10:00",end:"20:00",closed:false},
      thursday:{start:"10:00",end:"20:00",closed:false},
      friday:{start:"09:00",end:"14:00",closed:false},
      saturday:{start:"",end:"",closed:true}
    };

    const DEFAULT_SERVICES = [
      {text:"תספורת",price:"60",label:"תספורת - ₪60",value:"תספורת - ₪60"},
      {text:"תספורת + זקן",price:"80",label:"תספורת + זקן - ₪80",value:"תספורת + זקן - ₪80"},
      {text:"תספורת ילד",price:"40",label:"תספורת ילד - ₪40",value:"תספורת ילד - ₪40"}
    ];

    const planLabels = {basic:"בסיסי",pro:"מתקדם",premium:"פרימיום"};

    let businesses = [];
    let editingId = "";
    let selectedId = "";
    let appointments = [];
    const previousStats = {};
    let unsubscribe = null;
    let unsubscribeAppointments = null;

    const el = {
      homeScreen:document.getElementById("homeScreen"),
      formScreen:document.getElementById("formScreen"),
      detailScreen:document.getElementById("detailScreen"),
      openAddBtn:document.getElementById("openAddBtn"),
      backFromFormBtn:document.getElementById("backFromFormBtn"),
      backFromDetailsBtn:document.getElementById("backFromDetailsBtn"),
      businessDetails:document.getElementById("businessDetails"),
      businessName:document.getElementById("businessName"),
      businessId:document.getElementById("businessId"),
      whatsappNumber:document.getElementById("whatsappNumber"),
      plan:document.getElementById("plan"),
      ownerCode:document.getElementById("ownerCode"),
      saveBtn:document.getElementById("saveBtn"),
      resetBtn:document.getElementById("resetBtn"),
      refreshBtn:document.getElementById("refreshBtn"),
      searchInput:document.getElementById("searchInput"),
      businessList:document.getElementById("businessList"),
      formTitle:document.getElementById("formTitle"),
      saveStatus:document.getElementById("saveStatus")
    };

    function showScreen(name){
      [el.homeScreen,el.formScreen,el.detailScreen].forEach(s=>s.classList.remove("active"));
      if(name === "form") el.formScreen.classList.add("active");
      else if(name === "details") el.detailScreen.classList.add("active");
      else el.homeScreen.classList.add("active");
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function showToast(text, error=false){
      const t=document.getElementById("toast");
      t.textContent=text;
      t.classList.toggle("error",error);
      t.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer=setTimeout(()=>t.classList.remove("show"),3200);
    }

    function digits(v){return String(v||"").replace(/\D/g,"")}
    function cleanPhone(v){return digits(v).slice(0,12)}
    function validPhone(v){return /^972\d{9}$/.test(String(v||""))}
    function cleanId(v){return String(v||"").trim().toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"").replace(/-+/g,"-").replace(/^-|-$/g,"")}
    function html(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;")}
    function js(v){return String(v||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'")}
    function appLink(id){return APP_BASE_URL+"?business="+encodeURIComponent(id)}
    function waLink(id,phone){return "https://wa.me/"+phone+"?text="+encodeURIComponent("start_"+id)}
    function isBusinessFrozen(b){return b && (b.isFrozen === true || b.appFrozen === true || b.active === false || b.status === "frozen")}
    function frozenLabel(b){return isBusinessFrozen(b) ? "מוקפא" : "פעיל"}

    function toLocalDateString(d){
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,"0");
      const day=String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }

    function normalizeDateValue(v){
      if(!v) return null;
      if(v.toDate && typeof v.toDate === "function") return v.toDate();
      if(typeof v === "number") return new Date(v);
      if(typeof v === "string"){
        const raw=v.trim();
        if(!raw) return null;
        if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return new Date(raw+"T12:00:00");
        const d=new Date(raw);
        return isNaN(d.getTime()) ? null : d;
      }
      return null;
    }

    function appointmentBusinessId(a){
      return String(a.businessId || a.businessID || a.business || a.bizId || a.business_id || "").trim();
    }

    function appointmentDate(a){
      return normalizeDateValue(a.date || a.appointmentDate || a.day || a.slotDate || a.dateKey || a.startAt || a.time || a.createdAt || a.createdAtMs);
    }

    function appointmentActivityDate(a){
      return normalizeDateValue(a.updatedAt || a.updatedAtMs || a.createdAt || a.createdAtMs || a.date || a.appointmentDate || a.day || a.startAt);
    }

    function appointmentPhone(a){
      return cleanPhone(a.phone || a.customerPhone || a.whatsappNumber || a.customerWhatsapp || a.clientPhone || "");
    }

    function appointmentName(a){
      return String(a.name || a.customerName || a.fullName || a.clientName || "").trim();
    }

    function appointmentTime(a){
      return String(a.hour || a.timeSlot || a.slot || a.time || a.appointmentTime || "").trim();
    }

    function formatHebDate(d){
      if(!d) return "-";
      try{return d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"numeric"})}
      catch(e){return toLocalDateString(d)}
    }

    function computeStats(id){
      const now=new Date();
      const todayKey=toLocalDateString(now);
      const startOfWeek=new Date(now); startOfWeek.setHours(0,0,0,0); startOfWeek.setDate(now.getDate()-now.getDay());
      const endOfWeek=new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate()+7);
      const relevant=appointments.filter(a=>appointmentBusinessId(a) === id);
      const customerCounts={};
      relevant.forEach(a=>{
        const phone=appointmentPhone(a);
        if(phone) customerCounts[phone]=(customerCounts[phone]||0)+1;
      });
      const totalCustomers=Object.keys(customerCounts).length;
      const returningCustomers=Object.values(customerCounts).filter(n=>n>1).length;
      let today=0, week=0;
      relevant.forEach(a=>{
        const d=appointmentDate(a);
        if(!d || isNaN(d.getTime())) return;
        const key=toLocalDateString(d);
        if(key===todayKey) today++;
        if(d>=startOfWeek && d<endOfWeek) week++;
      });
      let last=null;
      relevant.forEach(a=>{
        const d=appointmentActivityDate(a);
        if(!d || isNaN(d.getTime())) return;
        if(!last || d>last.date) last={date:d,a};
      });
      return {totalCustomers,returningCustomers,today,week,last};
    }

    function renderStatsHtml(id){
      const s=computeStats(id);
      let activity="אין פעילות אחרונה";
      if(s.last){
        const a=s.last.a;
        const who=appointmentName(a) || appointmentPhone(a) || "לקוח";
        const when=formatHebDate(s.last.date);
        const time=appointmentTime(a);
        activity=`${html(who)} · ${html(when)}${time ? " · "+html(time) : ""}`;
      }

      const current={
        totalCustomers:s.totalCustomers,
        returningCustomers:s.returningCustomers,
        today:s.today,
        week:s.week,
        activity
      };
      const prev=previousStats[id] || null;
      const changed=(key)=>prev && String(prev[key]) !== String(current[key]) ? " stat-changed" : "";
      const activityChanged=prev && String(prev.activity) !== String(current.activity) ? " activity-changed" : "";
      previousStats[id]=current;

      return `
        <div class="stats-wrap">
          <div class="stats-strip" aria-label="נתוני עסק">
            <div class="stat-item${changed("totalCustomers")}"><div class="stat-value">${s.totalCustomers}</div><div class="stat-label">לקוחות</div></div>
            <div class="stat-item${changed("returningCustomers")}"><div class="stat-value">${s.returningCustomers}</div><div class="stat-label">חוזרים</div></div>
            <div class="stat-item${changed("today")}"><div class="stat-value">${s.today}</div><div class="stat-label">תורים היום</div></div>
            <div class="stat-item${changed("week")}"><div class="stat-value">${s.week}</div><div class="stat-label">השבוע</div></div>
          </div>
          <div class="activity-line${activityChanged}">פעילות אחרונה: <strong>${activity}</strong></div>
        </div>`;
    }

    async function copyText(text){
      try{await navigator.clipboard.writeText(text);showToast("הועתק")}
      catch(e){const i=document.createElement("input");i.value=text;document.body.appendChild(i);i.select();document.execCommand("copy");i.remove();showToast("הועתק")}
    }

    function resetForm(){
      editingId="";
      el.formTitle.textContent="הוספת עסק";
      el.saveBtn.textContent="שמור עסק";
      el.businessName.value="";
      el.businessId.value="";
      el.businessId.disabled=false;
      el.whatsappNumber.value="";
      el.plan.value="basic";
      el.ownerCode.value="1234";
      el.saveStatus.textContent="";
    }

    function fillForm(id){
      const b=businesses.find(x=>x.id===id);
      if(!b) return;
      editingId=id;
      el.formTitle.textContent="עריכת עסק";
      el.saveBtn.textContent="עדכן עסק";
      el.businessName.value=b.businessName||b.name||"";
      el.businessId.value=id;
      el.businessId.disabled=true;
      el.whatsappNumber.value=cleanPhone(b.whatsappNumber||b.phone||"");
      el.plan.value=b.plan||"basic";
      el.ownerCode.value=digits(b.ownerCode||"1234").slice(0,4);
      showScreen("form");
    }

    async function saveBusiness(){
      const businessName=el.businessName.value.trim();
      const businessId=cleanId(el.businessId.value);
      const whatsappNumber=cleanPhone(el.whatsappNumber.value);
      const plan=el.plan.value;
      const ownerCode=digits(el.ownerCode.value).slice(0,4)||"1234";

      el.businessId.value=businessId;
      el.whatsappNumber.value=whatsappNumber;
      el.ownerCode.value=ownerCode;

      if(!businessName){showToast("חסר שם עסק",true);return}
      if(!businessId){showToast("חסר businessId תקין",true);return}
      if(!validPhone(whatsappNumber)){showToast("מספר וואטסאפ חייב להתחיל ב־972 ולהיות 12 ספרות",true);return}

      el.saveBtn.disabled=true;
      el.saveStatus.textContent="שומר ל־businessSettings...";

      try{
        const now=Date.now();
        const ref=db.collection(COLLECTION).doc(businessId);
        const existing=await ref.get();
        const data=existing.exists ? existing.data()||{} : {};

        const payload={
          businessId,
          businessName,
          name:businessName,
          whatsappNumber,
          phone:whatsappNumber,
          plan,
          ownerCode,
          appUrl:appLink(businessId),
          whatsappUrl:waLink(businessId,whatsappNumber),
          updatedAtMs:now,
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!existing.exists){
          payload.isFrozen=false;
          payload.appFrozen=false;
          payload.active=true;
          payload.status="active";
        }

        if(!data.workingHours) payload.workingHours=DEFAULT_WORKING_HOURS;
        if(!Array.isArray(data.services)||!data.services.length) payload.services=DEFAULT_SERVICES;
        if(!data.logoSrc) payload.logoSrc = "logo.png";
        if(!data.heroBg) payload.heroBg = "background-behind-logo.png";
        if(!data.bookingTitle) payload.bookingTitle = "קביעת תור!";
        if(!data.businessTypeLabel) payload.businessTypeLabel = "מספרה";
        if(!data.ownerBadge) payload.ownerBadge = "עמוד בעל העסק";

        if(!existing.exists){payload.createdAtMs=now;payload.createdAt=firebase.firestore.FieldValue.serverTimestamp()}
        await ref.set(payload,{merge:true});

        selectedId=businessId;
        showToast("העסק נשמר בהצלחה");
        el.saveStatus.textContent="נשמר בהצלחה ב־businessSettings בלבד";
        resetForm();
        showScreen("home");
      }catch(err){
        console.error(err);
        el.saveStatus.textContent="שגיאה: "+(err.message||err);
        showToast("השמירה נכשלה. בדוק הרשאות Firestore",true);
      }finally{el.saveBtn.disabled=false}
    }

    async function toggleBusinessFreeze(id){
      const b=businesses.find(x=>x.id===id);
      if(!b) return;
      const nextFrozen=!isBusinessFrozen(b);
      const msg=nextFrozen
        ? "להקפיא את העסק? האפליקציה לא תהיה פעילה, אבל כל הנתונים יישמרו."
        : "להחזיר את העסק לפעילות רגילה?";
      if(!confirm(msg)) return;
      try{
        await db.collection(COLLECTION).doc(id).set({
          isFrozen:nextFrozen,
          appFrozen:nextFrozen,
          active:!nextFrozen,
          status:nextFrozen ? "frozen" : "active",
          frozenMessage:nextFrozen ? "האפליקציה לא פעילה כעת. עמכם הסליחה." : firebase.firestore.FieldValue.delete(),
          frozenAtMs:nextFrozen ? Date.now() : firebase.firestore.FieldValue.delete(),
          updatedAtMs:Date.now(),
          updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true});
        showToast(nextFrozen ? "העסק הוקפא — הנתונים נשמרו" : "העסק חזר לפעילות רגילה");
      }catch(err){
        console.error(err);
        showToast("עדכון סטטוס העסק נכשל",true);
      }
    }

    async function deleteBusiness(id){
      if(!confirm("למחוק את העסק לגמרי מ־businessSettings?")) return;
      try{
        await db.collection(COLLECTION).doc(id).delete();
        showToast("העסק נמחק לגמרי");
        if(editingId === id) resetForm();
        if(selectedId === id){selectedId="";showScreen("home")}
      }catch(err){console.error(err);showToast("מחיקה נכשלה",true)}
    }

    function openDetails(id){
      selectedId=id;
      renderDetails();
      showScreen("details");
    }

    function renderDetails(){
      const b=businesses.find(x=>x.id===selectedId);
      if(!b){el.businessDetails.innerHTML='<div class="empty">העסק לא נמצא.</div>';return}
      const id=b.id;
      const name=b.businessName||b.name||id;
      const phone=cleanPhone(b.whatsappNumber||b.phone||"");
      const plan=b.plan||"basic";
      const app=appLink(id);
      const wa=validPhone(phone)?waLink(id,phone):"מספר וואטסאפ לא תקין";
      const badgeClass=plan==="premium"?"premium":(plan==="pro"?"pro":"");
      el.businessDetails.innerHTML=`
        <div class="detail-card">
          <div class="business-top">
            <div>
              <div class="business-title">${html(name)}</div>
              <div class="meta">ID: ${html(id)}<br>וואטסאפ: ${html(phone||"-")}<br>קוד בעל עסק: ${html(b.ownerCode||"-")}</div>
            </div>
            <div><span class="badge ${badgeClass}">${html(planLabels[plan]||plan)}</span>${isBusinessFrozen(b) ? `<span class="badge frozen">מוקפא</span>` : ``}</div>
          </div>
          ${renderStatsHtml(id)}
          <div class="link-label">קישור לאפליקציה</div>
          <div class="link-row"><div class="link-box">${html(app)}</div><button class="mini-btn" onclick="copyText('${js(app)}')">העתק</button></div>
          <div class="link-label">קישור וואטסאפ</div>
          <div class="link-row"><div class="link-box">${html(wa)}</div><button class="mini-btn" onclick="copyText('${js(wa)}')">העתק</button></div>
          <div class="actions">
            <button class="btn ghost small" onclick="fillForm('${js(id)}')">ערוך</button>
            <button class="btn ghost small" onclick="window.open('${js(app)}','_blank')">פתח אפליקציה</button>
            <button class="btn ${isBusinessFrozen(b) ? "unfreeze" : "freeze"} small" onclick="toggleBusinessFreeze('${js(id)}')">${isBusinessFrozen(b) ? "הפעל עסק" : "הקפא עסק"}</button>
            <button class="btn danger small" onclick="deleteBusiness('${js(id)}')">מחק</button>
          </div>
        </div>`;
    }

    function render(){
      const q=String(el.searchInput.value||"").toLowerCase().trim();
      const list=businesses.filter(b=>{
        const t=[b.id,b.businessName,b.name,b.whatsappNumber,b.phone,b.plan].join(" ").toLowerCase();
        return !q || t.includes(q);
      });
      if(!list.length){el.businessList.innerHTML='<div class="empty">אין עסקים להצגה. לחץ על הוסף עסק כדי ליצור עסק חדש.</div>';return}
      el.businessList.innerHTML=list.map(b=>{
        const id=b.id;
        const name=b.businessName||b.name||id;
        const phone=cleanPhone(b.whatsappNumber||b.phone||"");
        const plan=b.plan||"basic";
        const state=frozenLabel(b);
        return `<button class="business-row" onclick="openDetails('${js(id)}')">
          <div><div class="row-title">${html(name)}</div><div class="row-sub">${html(id)} · ${html(phone||"-")} · ${html(planLabels[plan]||plan)} · ${html(state)}</div></div>
          <div class="row-arrow">‹</div>
        </button>`;
      }).join("");
      if(selectedId) renderDetails();
    }

    function subscribeAppointments(){
      if(unsubscribeAppointments) unsubscribeAppointments();
      unsubscribeAppointments=db.collection(APPOINTMENTS_COLLECTION).onSnapshot(snap=>{
        appointments=snap.docs.map(d=>({id:d.id,...d.data()}));
        if(selectedId) renderDetails();
      },err=>{
        console.error(err);
        showToast("טעינת נתוני תורים נכשלה",true);
      });
    }

    function subscribe(){
      if(unsubscribe) unsubscribe();
      el.businessList.innerHTML='<div class="empty">טוען עסקים...</div>';
      unsubscribe=db.collection(COLLECTION).orderBy("updatedAtMs","desc").onSnapshot(snap=>{
        businesses=snap.docs.map(d=>({id:d.id,...d.data()}));
        render();
      },err=>{
        console.error(err);
        el.businessList.innerHTML='<div class="empty">לא הצלחתי לטעון עסקים.<br>'+html(err.message||err)+'</div>';
        showToast("טעינת עסקים נכשלה",true);
      });
    }

    el.openAddBtn.addEventListener("click",()=>{resetForm();showScreen("form")});
    el.backFromFormBtn.addEventListener("click",()=>showScreen("home"));
    el.backFromDetailsBtn.addEventListener("click",()=>showScreen("home"));
    el.businessId.addEventListener("input",()=>el.businessId.value=cleanId(el.businessId.value));
    el.whatsappNumber.addEventListener("input",()=>el.whatsappNumber.value=cleanPhone(el.whatsappNumber.value));
    el.ownerCode.addEventListener("input",()=>el.ownerCode.value=digits(el.ownerCode.value).slice(0,4));
    el.saveBtn.addEventListener("click",saveBusiness);
    el.resetBtn.addEventListener("click",resetForm);
    el.refreshBtn.addEventListener("click",subscribe);
    el.searchInput.addEventListener("input",render);

    resetForm();
    subscribe();
    subscribeAppointments();
  </script>
</body>
</html>
